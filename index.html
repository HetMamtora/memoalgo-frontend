<link rel="manifest" href="/site.webmanifest" />

    <!--
      Baseline SEO. The Landing page is the only public, indexable route --
      everything else sits behind auth -- so this is the tag set that
      actually matters for search and for link-preview cards (Slack,
      Twitter, LinkedIn, iMessage, Discord, etc).
    -->
    <title>MemoAlgo - Never Forget A DSA Pattern Again</title>
    <meta
      name="description"
      content="Spaced Repetition built for problems you've already solved."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://memoalgo.dev/" />

    <!-- Open Graph (Slack, LinkedIn, Discord, Facebook, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://memoalgo.dev/" />
    <meta property="og:title" content="MemoAlgo -- Never Forget A DSA Pattern Again" />
    <meta
      property="og:description"
      content="Spaced Repetition built for problems you've already solved."

    <meta property="og:image" content="https://memoalgo.dev/og-image.png" />

    <!-- Twitter Card -->

    <meta name="twitter:title" content="MemoAlgo - Never Forget A DSA Pattern Again" />

      name="twitter:description"
      content="Spaced Repetition built for problems you've already solved."
    />
    <meta name="twitter:image" content="https://memoalgo.dev/og-image.png" />

    <!--
      Anti-FOUC theme script. Runs before React mounts so there is never a
      flash of the light theme for a user who prefers dark. ThemeContext
      is the only thing that *writes* to localStorage('theme') -- this
      script only *reads* it, so the two stay in sync by construction.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable (e.g. private mode) -- default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
