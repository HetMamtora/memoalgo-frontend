<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Baseline SEO. Pending to be Added
    -->
    <title>MemoAlgo - Spaced Repetition for DSA Revision</title>
    <meta
      name="description"
      content="MemoAlgo schedules your DSA problem revisions automatically using spaced repetition, so the patterns you've already learned don't fade."
    />
    <meta name="robots" content="index, follow" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable (e.g. private mode) -- default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
